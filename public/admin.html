<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8" />
<title>STEVE FOOD — Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; font-family: -apple-system, Inter, sans-serif; }
  body { margin: 0; background: #FAFAFA; color: #1A1A1A; }
  header { background: #FF5A1F; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; margin: 0; }
  #login { max-width: 360px; margin: 80px auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  #login input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #eee; border-radius: 8px; }
  #login button, .btn { background: #FF5A1F; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  #app { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
  .order { background: white; border: 1px solid #F0F0F0; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .order-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .order-id { font-weight: 800; }
  .status { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .status.konfime { background: #FFF1EA; color: #FF5A1F; }
  .status.preparasyon { background: #FFF7DB; color: #B8860B; }
  .status.pran { background: #E9F0FF; color: #2E5AAC; }
  .status.annwout { background: #E9F0FF; color: #2E5AAC; }
  .status.livre { background: #E7F8EE; color: #22A559; }
  .status.anile { background: #FDEAEA; color: #E14848; }
  .items { font-size: 13px; color: #666; margin: 6px 0; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  select, .row button { padding: 6px 10px; border-radius: 8px; border: 1px solid #eee; font-size: 13px; }
  .muted { color: #8B8B8B; font-size: 12px; }
  .empty { text-align: center; color: #8B8B8B; padding: 40px; }
</style>
</head>
<body>

<div id="login">
  <h2>🔥 STEVE FOOD Admin</h2>
  <p class="muted">Antre kle admin ki nan fichye .env ou a (ADMIN_KEY)</p>
  <input id="keyInput" type="password" placeholder="Kle admin..." />
  <button class="btn" onclick="login()">Antre</button>
  <p id="loginError" style="color:#E14848;font-size:13px;"></p>
</div>

<div id="app">
  <header>
    <h1>🔥 STEVE FOOD — Kòmand an Tan Reyèl</h1>
    <span id="count" class="muted" style="color:white;"></span>
  </header>
  <div style="padding:16px;">
    <div id="orders"></div>
  </div>
</div>

<script>
  let socket, adminKey;
  const STATUS_FLOW = ["konfime", "preparasyon", "pran", "annwout", "livre", "anile"];
  const STATUS_LABEL = {
    konfime: "Konfime", preparasyon: "Preparasyon", pran: "Chofè pran l",
    annwout: "Annwout", livre: "Livre", anile: "Anile",
  };
  const ordersById = {};

  function login() {
    adminKey = document.getElementById("keyInput").value;
    fetch("/api/orders", { headers: {} }).then(() => {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      init();
    });
  }

  async function init() {
    socket = io();
    socket.emit("join-admin", adminKey);
    socket.on("new-order", (order) => { ordersById[order.id] = order; render(); playPing(); });
    socket.on("order-updated", (order) => { ordersById[order.id] = order; render(); });

    const res = await fetch("/api/orders");
    const orders = await res.json();
    orders.forEach((o) => (ordersById[o.id] = o));
    render();
  }

  function playPing() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      osc.frequency.value = 880;
      osc.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch (e) {}
  }

  function nextStatus(current) {
    const i = STATUS_FLOW.indexOf(current);
    return i >= 0 && i < STATUS_FLOW.length - 2 ? STATUS_FLOW[i + 1] : null;
  }

  async function updateStatus(id, status) {
    await fetch(`/api/orders/${id}/status`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
  }

  async function confirmPayment(id) {
    await fetch(`/api/orders/${id}/status`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ paymentConfirmed: true }),
    });
  }

  function render() {
    const list = Object.values(ordersById).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    document.getElementById("count").textContent = list.length + " kòmand";
    const container = document.getElementById("orders");
    if (list.length === 0) {
      container.innerHTML = '<div class="empty">Poko gen kòmand. Y ap parèt isit la an tan reyèl.</div>';
      return;
    }
    container.innerHTML = list.map((o) => `
      <div class="order">
        <div class="order-top">
          <span class="order-id">#${o.id} — ${o.restaurant?.name || ""}</span>
          <span class="status ${o.status}">${STATUS_LABEL[o.status] || o.status}</span>
        </div>
        <div class="items">${(o.items || []).map(it => `${it.qty}× ${it.name}`).join(", ")}</div>
        <div class="muted">
          ${o.customer_name || "Kliyan"} · ${o.customer_phone || "—"} · ${o.address || "Adrès pa bay"}<br/>
          Peman: <b>${o.payment_method}</b> ${o.payment_reference ? "(ref: " + o.payment_reference + ")" : ""}
          ${o.payment_confirmed ? " ✅ konfime" : " ⏳ poko konfime"} · Total: <b>${o.total} HTG</b>
        </div>
        <div class="row">
          ${!o.payment_confirmed ? `<button onclick="confirmPayment('${o.id}')">✅ Konfime Peman</button>` : ""}
          ${nextStatus(o.status) ? `<button onclick="updateStatus('${o.id}', '${nextStatus(o.status)}')">➡ ${STATUS_LABEL[nextStatus(o.status)]}</button>` : ""}
          ${o.status !== "livre" && o.status !== "anile" ? `<button onclick="updateStatus('${o.id}', 'anile')" style="background:#FDEAEA;color:#E14848;">✕ Anile</button>` : ""}
        </div>
      </div>
    `).join("");
  }
</script>
</body>
